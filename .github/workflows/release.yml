name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5.0.2

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          # Generate versionCode from major.minor.patch: major*10000 + minor*100 + patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "code=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: ./gradlew assembleRelease -Papp.versionName=${{ steps.version.outputs.name }} -Papp.versionCode=${{ steps.version.outputs.code }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        id: sign
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename signed APK
        run: mv ${{ steps.sign.outputs.signedFile }} app/build/outputs/apk/release/ImmichCloudMedia-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/ImmichCloudMedia-${{ github.ref_name }}.apk
